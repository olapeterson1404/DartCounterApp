<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Dart Counter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone">
      <section id="setup-view" class="view">
        <header class="head">
          <h1>Dart Counter</h1>
          <p>Välj spel, spelare och starta match.</p>
        </header>

        <div class="card settings">
          <label>Poäng
            <select id="points"></select>
          </label>
          <label>Checkout
            <select id="checkout"></select>
          </label>
          <label>Sets
            <select id="sets"></select>
          </label>
          <label>Legs
            <select id="legs"></select>
          </label>
          <label>Set/Leg
            <select id="mode"></select>
          </label>
        </div>

        <div class="card">
          <div class="row">
            <input id="new-player" type="text" placeholder="Nytt spelarnamn" />
            <button id="add-player-btn" class="btn primary">Lägg till</button>
          </div>

          <div class="lists">
            <div>
              <h3>Sparade spelare</h3>
              <select id="player-library" size="5"></select>
              <button id="add-to-match" class="btn">Lägg till i match</button>
            </div>
            <div>
              <h3>Matchspelare (max 5)</h3>
              <select id="match-players" size="5"></select>
              <div class="row small-gap">
                <button id="remove-from-match" class="btn">Ta bort</button>
                <button id="move-up" class="btn">Upp</button>
                <button id="move-down" class="btn">Ner</button>
              </div>
            </div>
          </div>
        </div>

        <p id="setup-status" class="status"></p>
        <button id="start-btn" class="btn start">Starta spel</button>
      </section>

      <section id="game-view" class="view hidden">
        <header class="head">
          <div class="row spread">
            <div>
              <h1 id="game-title">301</h1>
              <p id="game-subtitle"></p>
            </div>
            <button id="back-btn" class="btn">Tillbaka</button>
          </div>
        </header>

        <p id="game-status" class="status"></p>

        <section id="players-board" class="players"></section>

        <section class="card">
          <p id="checkout-main" class="checkout-main"></p>
          <p id="checkout-alt1" class="checkout-alt"></p>
          <p id="checkout-alt2" class="checkout-alt"></p>
          <p id="checkout-alt3" class="checkout-alt"></p>
        </section>

        <section class="card keypad-wrap">
          <div class="row small-gap">
            <button id="double-btn" class="btn mod double">DOUBLE</button>
            <button id="triple-btn" class="btn mod triple">TRIPLE</button>
            <button id="undo-btn" class="btn mod undo">ÅNGRA</button>
          </div>
          <div id="keypad" class="keypad"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
